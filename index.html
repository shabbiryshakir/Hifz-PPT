<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hifzul Quran Presentation - PHS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js"></script>

    <style>
        /* Load Alkanz Font */
        @font-face {
            font-family: 'Alkanz';
            src: url('alkanz.ttf') format('truetype'), url('alkanz.woff') format('woff');
        }

        body {
            margin: 0; overflow: hidden; 
            font-family: 'Alkanz', serif; 
            background-color: #022c22; color: white;
            user-select: none; cursor: pointer; perspective: 2000px; 
        }

        /* Ambient Hall Lighting */
        #bg-canvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 30%, #064e3b 0%, #022c22 50%, #000000 100%);
            transition: background 2s ease; z-index: 0;
        }
        
        #bg-canvas::after {
            content: ''; position: absolute; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/arabesque.png');
            opacity: 0.05; mix-blend-mode: overlay; pointer-events: none;
        }

        body.theme-gold-active #bg-canvas {
            background: radial-gradient(circle at 50% 30%, #422006 0%, #271404 50%, #000000 100%);
        }

        .alkanz-fix {
            line-height: 1.8 !important; padding-bottom: 0.5em; padding-top: 0.2em; overflow: visible;
        }

        #logo-container {
            position: fixed; top: 30px; right: 40px; z-index: 100;
            filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.8));
        }
        #logo-container img { height: 110px; width: auto; object-fit: contain; }

        #presentation-container {
            width: 100vw; height: 100vh; position: relative;
            transform-style: preserve-3d; z-index: 10;
        }

        /* --- SLIDE TRANSITIONS --- */
        .slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; pointer-events: none; transform-style: preserve-3d;
        }
        .slide.active { opacity: 1; visibility: visible; pointer-events: auto; z-index: 20; }

        .slide[data-trans="zoom"] { transform: translateZ(-1500px); transition: all 1.2s cubic-bezier(0.25, 1, 0.2, 1); }
        .slide[data-trans="zoom"].active { transform: translateZ(0); }
        .slide[data-trans="flip"] { transform: rotateX(-90deg) translateZ(-500px); transition: all 1.2s cubic-bezier(0.25, 1, 0.2, 1); }
        .slide[data-trans="flip"].active { transform: rotateX(0deg) translateZ(0); }
        .slide[data-trans="rise"] { transform: translateY(100vh) scale(0.9); transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide[data-trans="rise"].active { transform: translateY(0) scale(1); }

        .fade-up { opacity: 0; transform: translateY(40px); transition: all 1s ease-out; }
        .active .fade-up { opacity: 1; transform: translateY(0); }
        .delay-100 { transition-delay: 150ms; }
        .delay-200 { transition-delay: 300ms; }

        /* --- THE VIRTUAL PLAQUES --- */
        .students-container {
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            width: 95vw; max-height: 75vh; 
        }

        .plaque-wrapper { opacity: 0; perspective: 1000px; }

        .plaque {
            display: flex; justify-content: center; align-items: center; text-align: center;
            border-radius: 12px; position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.5);
            padding: 0.75rem 1rem; width: 100%; height: 100%;
            transform-style: preserve-3d; transition: transform 0.4s ease;
        }

        .plaque::before {
            content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
            border-radius: 8px; pointer-events: none;
        }

        .plaque-text {
            font-family: sans-serif; font-weight: bold; line-height: 1.2; z-index: 2; 
            white-space: normal; word-wrap: break-word; letter-spacing: 0.5px;
        }

        /* Themes */
        .theme-bronze .plaque { background: linear-gradient(145deg, #4b3621, #2c1e16); border: 2px solid #a67c52; }
        .theme-bronze .plaque::before { border: 1px dashed rgba(166, 124, 82, 0.5); }
        .theme-bronze .plaque-text { color: #fef08a; text-shadow: 2px 2px 4px rgba(0,0,0,1); }

        .theme-emerald .plaque { background: linear-gradient(145deg, #064e3b, #022c22); border: 2px solid #34d399; }
        .theme-emerald .plaque::before { border: 1px solid rgba(52, 211, 153, 0.4); }
        .theme-emerald .plaque-text { color: #ffffff; text-shadow: 2px 2px 5px rgba(0,0,0,1); }

        .theme-gold .plaque { 
            background: linear-gradient(145deg, #854d0e, #422006); border: 3px solid #fbbf24; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 20px rgba(251, 191, 36, 0.3), inset 0 0 20px rgba(0,0,0,0.8);
        }
        .theme-gold .plaque::before { border: 2px solid rgba(251, 191, 36, 0.6); }
        .theme-gold .plaque-text { color: #fef08a; text-shadow: 0 3px 8px rgba(0,0,0,1); }

        /* Spotlight System */
        #spotlight-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            opacity: 0; z-index: 1000; pointer-events: none;
        }

        #spotlight-plaque {
            width: 450px; min-height: 180px; padding: 2rem; transform: translateZ(100px); 
            box-shadow: 0 30px 60px rgba(0,0,0,1), 0 0 80px rgba(255,255,255,0.1);
        }
        #spotlight-plaque .plaque-text { font-size: 2.5rem !important; }

        .text-gold-gradient { background: -webkit-linear-gradient(#fef08a, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Big Marhala Number Roll */
        .huge-stat-box {
            position: absolute; top: 40px; left: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transform: translateY(-20px); transition: all 1s ease 0.5s;
        }
        .active .huge-stat-box { opacity: 1; transform: translateY(0); }

        /* --- REMOTE CONTROL UI --- */
        #remote-ui {
            display: none; position: fixed; inset: 0; background: #111827; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center; padding: 2rem; gap: 1rem;
            font-family: sans-serif;
        }
        .remote-btn {
            width: 100%; padding: 1.5rem; font-size: 1.5rem; font-weight: bold; border-radius: 1rem;
            color: white; text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }
        .remote-btn:active { transform: scale(0.95); }
        .btn-next { background: #059669; flex-grow: 2; font-size: 2.5rem; display: flex; justify-content: center; align-items: center;}
        .btn-skip { background: #d97706; }
        .btn-prev { background: #4b5563; }
        #remote-status { color: #9ca3af; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <div id="remote-ui" dir="ltr">
        <h2 class="text-2xl text-white font-bold mb-2">PHS Remote Control</h2>
        <div id="remote-status">Connecting to screen...</div>
        
        <button class="remote-btn btn-next" onclick="sendRemoteCommand('next')">NEXT SLIDE</button>
        <button class="remote-btn btn-skip" onclick="sendRemoteCommand('skip')">SKIP ANIMATION</button>
        <button class="remote-btn btn-prev" onclick="sendRemoteCommand('prev')">PREVIOUS SLIDE</button>
    </div>

    <div id="bg-canvas"></div>

    <div id="logo-container">
        <img src="logo.png" alt="School Logo" onerror="this.style.display='none'">
    </div>

    <div id="spotlight-container">
        <div id="spotlight-plaque" class="plaque">
            <div id="spotlight-name" class="plaque-text"></div>
        </div>
    </div>

    <div id="presentation-container"></div>

    <script>
        // --- 1. DATA CONFIGURATION ---
        const overallStats = { students: 36, attendance: 242, htb: 13 };

        const marhalas = [
            { theme: "bronze", nameAr: "جزء عم", nameEn: "Juz Amma", students: ["Moiz Semalda", "Mariya Shikari", "Mubina anif", "Burhanuddin munshi", "Fatema asif", "Husaina thencha", "Huazifa badshah", "Nafisa saifee", "Moahmmed naseem", "Batul saify", "Aliasgar sundrel", "Mohammed Ajanda", "Zahara rizvi", "Husain rizvi", "Sakina shad", "Zainab naseem", "Nafisa naseem", "Sakina Shakir", "Batul Naseem", "Zahra rajpur", "Insiya Boraji", "Insiya Saifee", "Amatullah Rasgaw", "Rashida lucky", "Burhanuddin Amin", "Zahara zabir"] }, 
            { theme: "bronze", nameAr: "مرحلة ثانية", nameEn: "Marhala Sanea", students: ["Munira Sabir", "Aziz semalda", "Zahra dabir", "Tasneem saifee", "Rashida saifee", "Idris noorkhanji", "Ruquiya taheri", "Mariya arif", "Insiyah dawoodi", "Insiya bharmal", "Zainab dabeer", "Mufaddal mandleshwar", "Zainab dhinoj", "Abdulqadir rizvi"] }, 
            { theme: "bronze", nameAr: "مرحلة ثالثة", nameEn: "Marhala Salesa", students: ["Ruquiya Sheikh", "Aziz Semalda", "Insiya Johar", "Alefiya Arif"] }, 
            { theme: "emerald", nameAr: "مرحلة رابعة", nameEn: "Marhala Rabea", students: ["Huzaifa Munshi", "Burhanuddin Lucky"] }, 
            { theme: "emerald", nameAr: "مرحلة خامسة", nameEn: "Marhala Khamesa", students: ["Sakina Saify", "Fatema Hamid", "Huzaifa Munshi", "Nafisa Alirajpur", "Burhanuddin Lucky"] }, 
            { theme: "emerald", nameAr: "مرحلة سادسة", nameEn: "Marhala Sadesa", students: ["Luvai Ranala", "Naqiya Patwa", "Husaina Noorkhanji", "Ruqaiyah Semalda", "Mariya Rizvi"] }, 
            { theme: "emerald", nameAr: "مرحلة سابعة", nameEn: "Marhala Sabea", students: ["Luvai Ranala"] }, 
            { theme: "gold", nameAr: "حفاظ", nameEn: "Huffaz", students: ["Zainab bn Ojhar", "Insiya bn Malak", "Mohammad Mandleshwar", "Sarrah Kagzi"] } 
        ];

        // --- 2. HTML GENERATOR ---
        const container = document.getElementById('presentation-container');
        let htmlContent = '';

        // Slide 0: Title
        htmlContent += `
            <div class="slide active" id="slide-0" data-trans="zoom">
                <h2 class="text-3xl md:text-4xl text-[#a7f3d0] fade-up tracking-widest mb-2 font-sans uppercase drop-shadow-lg">Panjataniyah Higher Secondary School</h2>
                <h1 class="text-8xl md:text-[11rem] font-bold mb-0 fade-up delay-100 text-[#d4af37] drop-shadow-[0_15px_25px_rgba(0,0,0,0.9)] alkanz-fix">
                    حفظ القران الكريم
                </h1>
                <p class="text-3xl text-[#d1fae5] fade-up delay-200 tracking-wider font-sans uppercase shadow-black">Annual Statistics & Achievements</p>
            </div>
        `;

        // Slide 1: Stats
        htmlContent += `
            <div class="slide" id="slide-1" data-trans="flip">
                <h2 class="text-8xl font-bold mb-12 fade-up text-[#d4af37] alkanz-fix drop-shadow-2xl">نظرة عامة</h2>
                <div class="flex gap-16 text-center fade-up delay-200" dir="ltr">
                    <div class="bg-black/40 backdrop-blur-md p-10 rounded-3xl border border-[#d4af37]/40 shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                        <div class="text-8xl font-bold text-white mb-4 stat-number" data-target="${overallStats.students}">0</div>
                        <div class="text-xl text-[#fde047] font-sans uppercase tracking-widest font-bold">Total Students</div>
                    </div>
                    <div class="bg-black/40 backdrop-blur-md p-10 rounded-3xl border border-[#d4af37]/40 shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                        <div class="text-8xl font-bold text-white mb-4 stat-number" data-target="${overallStats.attendance}">0</div>
                        <div class="text-xl text-[#fde047] font-sans uppercase tracking-widest font-bold">Total Attendance</div>
                    </div>
                    <div class="bg-black/40 backdrop-blur-md p-10 rounded-3xl border border-[#d4af37]/40 shadow-[0_20px_50px_rgba(0,0,0,0.8)]">
                        <div class="text-8xl font-bold text-white mb-4 stat-number" data-target="${overallStats.htb}">0</div>
                        <div class="text-xl text-[#fde047] font-sans uppercase tracking-widest font-bold">Total HTB</div>
                    </div>
                </div>
            </div>
        `;

        // Slides 2+: Dynamic Plaque Grids
        marhalas.forEach((marhala, index) => {
            const slideId = index + 2;
            const count = marhala.students.length;
            const isGold = marhala.theme === 'gold';
            const trans = isGold ? 'rise' : (index % 2 === 0 ? 'zoom' : 'flip');

            // --- INTELLIGENT PLAQUE SIZING & SPACING (Fixed for bleeding) ---
            let plaqueWidth, fontSize, minHeight, containerGap, titleMargin;
            if (count > 20) {
                plaqueWidth = '150px'; fontSize = '0.9rem'; minHeight = '50px'; containerGap = '0.75rem'; titleMargin = 'mb-2'; 
            } else if (count > 10) {
                plaqueWidth = '220px'; fontSize = '1.15rem'; minHeight = '80px'; containerGap = '1.2rem'; titleMargin = 'mb-6';
            } else if (count > 4) {
                plaqueWidth = '280px'; fontSize = '1.4rem'; minHeight = '100px'; containerGap = '1.5rem'; titleMargin = 'mb-8'; 
            } else {
                plaqueWidth = '350px'; fontSize = '1.8rem'; minHeight = '130px'; containerGap = '2rem'; titleMargin = 'mb-10'; 
            }

            let studentsHtml = '';
            marhala.students.forEach((student) => {
                studentsHtml += `
                    <div class="plaque-wrapper theme-${marhala.theme}" data-name="${student}" data-theme="${marhala.theme}" style="width: ${plaqueWidth}; min-height: ${minHeight};">
                        <div class="plaque">
                            <h3 class="plaque-text" style="font-size: ${fontSize};">${student}</h3>
                        </div>
                    </div>
                `;
            });

            const titleColor = isGold ? 'text-gold-gradient drop-shadow-[0_10px_10px_rgba(251,191,36,0.3)]' : 'text-[#d4af37]';

            htmlContent += `
                <div class="slide" id="slide-${slideId}" data-trans="${trans}" data-istheme="${marhala.theme}">
                    <div class="huge-stat-box" dir="ltr">
                        <div class="text-[10rem] font-bold text-[#d4af37]/80 leading-none stat-number drop-shadow-[0_0_25px_rgba(212,175,55,0.4)]" data-target="${count}">0</div>
                        <div class="text-2xl text-[#a7f3d0] font-sans uppercase tracking-widest mt-[-20px] font-bold drop-shadow-md">Students</div>
                    </div>

                    <h2 class="text-7xl md:text-[6.5rem] font-bold mb-0 fade-up alkanz-fix ${titleColor} drop-shadow-[0_10px_20px_rgba(0,0,0,1)]">${marhala.nameAr}</h2>
                    <p class="text-2xl text-[#d1fae5] ${titleMargin} fade-up delay-100 font-sans tracking-widest uppercase shadow-black">${marhala.nameEn}</p>
                    
                    <div class="students-container" dir="ltr" style="gap: ${containerGap};">
                        ${studentsHtml}
                    </div>
                </div>
            `;
        });

        // End Slide
        htmlContent += `
            <div class="slide" id="slide-${marhalas.length + 2}" data-trans="rise">
                <h1 class="text-[10rem] font-bold fade-up text-gold-gradient drop-shadow-[0_20px_30px_rgba(0,0,0,0.9)] alkanz-fix leading-tight text-center">
                    الحمد لله <br> شكراً لله
                </h1>
            </div>
        `;

        container.innerHTML = htmlContent;

        // --- 3. PRESENTATION LOGIC ---
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        let currentAnimationId = 0;

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        async function runCinematicReveal(slideId, animId) {
            const slide = document.getElementById(`slide-${slideId}`);
            const cards = slide.querySelectorAll('.plaque-wrapper');
            const spotlight = document.getElementById('spotlight-container');
            const spotPlaque = document.getElementById('spotlight-plaque');
            const spotName = document.getElementById('spotlight-name');

            cards.forEach(c => c.style.opacity = 0);
            await sleep(800);

            for (let i = 0; i < cards.length; i++) {
                if (currentAnimationId !== animId) return;

                const card = cards[i];
                const studentName = card.getAttribute('data-name');
                const theme = card.getAttribute('data-theme');
                
                spotName.innerText = studentName;
                spotPlaque.className = 'plaque'; 
                spotlight.className = `theme-${theme}`;

                spotlight.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                spotlight.style.opacity = 1;
                spotlight.style.transform = 'translate(-50%, -50%) scale(1)';
                
                await sleep(1000); 
                if (currentAnimationId !== animId) return;

                const targetPlaque = card.querySelector('.plaque');
                const rect = targetPlaque.getBoundingClientRect();
                const targetX = rect.left + rect.width / 2;
                const targetY = rect.top + rect.height / 2;
                const deltaX = targetX - (window.innerWidth / 2);
                const deltaY = targetY - (window.innerHeight / 2);
                
                const scale = targetPlaque.offsetWidth / spotPlaque.offsetWidth;

                spotlight.style.transition = 'all 0.4s cubic-bezier(0.55, 0.085, 0.68, 0.53)';
                spotlight.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px)) scale(${scale})`;
                spotlight.style.opacity = 0;

                await sleep(350);
                if (currentAnimationId !== animId) return;

                card.style.opacity = 1;
                card.style.transition = 'opacity 0.2s';
                
                await sleep(100); 
            }
        }

        function triggerSkipAnimation() {
            currentAnimationId++; 
            const spotlight = document.getElementById('spotlight-container');
            spotlight.style.opacity = 0;
            spotlight.style.transform = 'translate(-50%, -50%) scale(0)';
            
            const activeCards = slides[currentSlide].querySelectorAll('.plaque-wrapper');
            activeCards.forEach(c => {
                c.style.transition = 'opacity 0.3s';
                c.style.opacity = 1;
            });
        }

        function animateNumbersForSlide(slideElement) {
            const counters = slideElement.querySelectorAll('.stat-number');
            counters.forEach(counter => {
                const target = +counter.getAttribute('data-target');
                counter.innerText = '0'; 
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const progress = Math.min((timestamp - startTimestamp) / 1500, 1);
                    counter.innerText = Math.floor((1 - Math.pow(1 - progress, 4)) * target);
                    if (progress < 1) window.requestAnimationFrame(step);
                    else counter.innerText = target;
                };
                window.requestAnimationFrame(step);
            });
        }

        function triggerNextSlide() {
            if (currentSlide < slides.length - 1) {
                triggerSkipAnimation();
                const oldCounters = slides[currentSlide].querySelectorAll('.stat-number');
                oldCounters.forEach(c => c.innerText = '0');

                slides[currentSlide].classList.remove('active');
                currentSlide++;
                slides[currentSlide].classList.add('active');

                if (slides[currentSlide].getAttribute('data-istheme') === 'gold') {
                    document.body.classList.add('theme-gold-active');
                } else {
                    document.body.classList.remove('theme-gold-active');
                }

                setTimeout(() => animateNumbersForSlide(slides[currentSlide]), 600);
                if (currentSlide >= 2 && currentSlide < slides.length - 1) {
                    currentAnimationId++;
                    runCinematicReveal(currentSlide, currentAnimationId);
                }
            }
        }

        function triggerPrevSlide() {
            triggerSkipAnimation();
            if (currentSlide > 0) {
                const oldCounters = slides[currentSlide].querySelectorAll('.stat-number');
                oldCounters.forEach(c => c.innerText = '0');

                slides[currentSlide].classList.remove('active');
                currentSlide--;
                slides[currentSlide].classList.add('active');
                
                if (slides[currentSlide].getAttribute('data-istheme') !== 'gold') {
                    document.body.classList.remove('theme-gold-active');
                }
                setTimeout(() => animateNumbersForSlide(slides[currentSlide]), 600);
            }
        }

        // Standard Keyboard and Click events (for PC)
        document.body.addEventListener('click', (e) => {
            // Prevent if clicking on remote UI
            if(e.target.classList.contains('remote-btn') || isRemote) return; 
            triggerNextSlide();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowRight') triggerNextSlide();
            if (e.code === 'ArrowLeft') triggerPrevSlide();
            if (e.code === 'Enter' || e.code === 'Space') {
                e.preventDefault(); triggerSkipAnimation();
            }
        });


        // --- 4. CLOUD REMOTE CONTROL SYSTEM ---
        
        // UNIQUE CHANNEL ID - This prevents someone else's presentation from controlling yours.
        const MQTT_TOPIC = "phs-quran-event-2026-remote"; 
        
        const urlParams = new URLSearchParams(window.location.search);
        const isRemote = urlParams.get('remote') === 'true';
        let mqttClient = null;

        if (isRemote) {
            // Turn on remote UI, hide presentation
            document.getElementById('remote-ui').style.display = 'flex';
            document.getElementById('bg-canvas').style.display = 'none';
            document.getElementById('logo-container').style.display = 'none';
            document.getElementById('presentation-container').style.display = 'none';
        }

        function connectToMQTT() {
            // Using HiveMQ's free public websocket broker
            const clientId = "phs-" + Math.random().toString(16).substr(2, 8);
            mqttClient = new Paho.MQTT.Client("broker.hivemq.com", 8443, "/mqtt", clientId);

            mqttClient.onConnectionLost = function (responseObject) {
                if (isRemote) document.getElementById('remote-status').innerText = "Disconnected. Retrying...";
                setTimeout(connectToMQTT, 2000); // Reconnect
            };

            mqttClient.onMessageArrived = function (message) {
                if(isRemote) return; // Remote doesn't listen to commands, it sends them

                const cmd = message.payloadString;
                if (cmd === "next") triggerNextSlide();
                else if (cmd === "skip") triggerSkipAnimation();
                else if (cmd === "prev") triggerPrevSlide();
            };

            mqttClient.connect({
                useSSL: true,
                onSuccess: function () {
                    if (isRemote) {
                        document.getElementById('remote-status').innerText = "Connected! Ready to control.";
                        document.getElementById('remote-status').style.color = "#34d399";
                    }
                    mqttClient.subscribe(MQTT_TOPIC);
                },
                onFailure: function() {
                    if (isRemote) document.getElementById('remote-status').innerText = "Failed to connect to signal server.";
                }
            });
        }

        function sendRemoteCommand(cmd) {
            if (mqttClient && mqttClient.isConnected()) {
                const message = new Paho.MQTT.Message(cmd);
                message.destinationName = MQTT_TOPIC;
                mqttClient.send(message);
            }
        }

        // Boot up the remote server connection
        connectToMQTT();

    </script>
</body>
</html>
